name: build

on:
  push:
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    name: build-${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        shell: bash
        run: |
          dotnet publish SekaiToolsApp/SekaiToolsApp.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:UseAppHost=true -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SekaiTools-${{ matrix.rid }}
          path: SekaiToolsApp/bin/Release/net10.0/${{ matrix.rid }}/publish/
